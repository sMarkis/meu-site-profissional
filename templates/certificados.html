<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificações - André</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.2">
</head>
<body>

    <!-- Botão de Menu para Celular -->
    <button class="menu-toggle" id="btnMenu">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Menu Lateral (Sidebar) -->
    <nav class="sidebar" id="mySidebar">
        <ul>
            <a href="/">
                <li>
                    <span class="icon"><i class="fas fa-house"></i></span>
                    <span class="text">Início</span>
                </li>
            </a>
            <a href="/#servicos">
                <li>
                    <span class="icon"><i class="fas fa-briefcase"></i></span>
                    <span class="text">Serviços</span>
                </li>
            </a>
            <a href="/certificados">
                <li>
                    <span class="icon"><i class="fas fa-graduation-cap"></i></span>
                    <span class="text">Certificações</span>
                </li>
            </a>
            <a href="/links">
                <li>
                    <span class="icon"><i class="fas fa-link"></i></span>
                    <span class="text">Meus Links</span>
                </li>
            </a>
            <a href="{{ whatsapp }}" target="_blank">
                <li>
                    <span class="icon"><i class="fab fa-whatsapp"></i></span>
                    <span class="text">WhatsApp</span>
                </li>
            </a>
        </ul>
    </nav>

    <main class="content">
        <section>
            <h1>Minhas Certificações</h1>
            <p>Aprimoramento contínuo em tecnologia e gestão pública.</p>
            
            <div class="card-container">
                <!-- Exemplo de Card de Certificado -->
                <div class="card">
                    <h3>Python para Automação</h3>
                    <p>Especialização em scripts RPA e manipulação de dados.</p>
                </div>
                <!-- Adicione mais conforme desejar -->
            </div>
        </section>

        <footer>
            <p>&copy; 2026 André Soluções Administrativas.</p>
        </footer>
    </main>

    <a href="{{ whatsapp }}" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('btnMenu');
            const sidebar = document.getElementById('mySidebar');
            btn.addEventListener('click', function() {
                sidebar.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
